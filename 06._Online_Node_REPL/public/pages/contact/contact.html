<h1>Contact</h1>
<form action="api/contact" method="POST">
    <fieldset>
        <label>Name</label>
        <input name="name" placeholder="Name...">

        <label>Email</label>
        <input name="email" type="email" placeholder="Email...">

        <label >Message</label>
        <textarea name="message"></textarea>

        <button>Send message</button>
    </fieldset>

</form>
